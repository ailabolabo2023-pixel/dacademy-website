<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>売上管理表 | えぇ塩梅屋</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #D4AF37;
            --pine-green: #2D5A27;
            --text-color: #2F2F2F;
            --bg-color: #f4f4f4;
        }

        body {
            margin: 0; padding: 40px;
            font-family: 'Zen Kaku Gothic New', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 1000px; max-width: 95%; }

        .header {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 30px; border-bottom: 3px solid var(--text-color);
            padding-bottom: 15px;
        }

        .title { font-size: 32px; font-family: 'Klee One', serif; margin: 0; letter-spacing: 0.3rem; }

        .btn-group { display: flex; gap: 10px; }
        .btn { border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; }
        .btn-csv { background-color: var(--pine-green); color: white; }
        .btn-clear { background-color: #999; color: white; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .stat-value { font-size: 28px; font-weight: bold; font-family: 'Klee One', serif; color: var(--pine-green); }

        .month-section { margin-bottom: 50px; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .month-header { background: #333; color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .month-title { font-size: 18px; margin: 0; font-family: 'Klee One', serif; }

        .sales-table { width: 100%; border-collapse: collapse; }
        .sales-table th { background: #f9f9f9; padding: 12px 20px; text-align: left; font-size: 13px; border-bottom: 1px solid #eee; }
        .sales-table td { padding: 15px 20px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .btn-del-entry { background: none; border: none; color: #ccc; cursor: pointer; }
        .btn-del-entry:hover { color: #f44336; }

        /* View buttons */
        .view-btn {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4.5px 12px; border-radius: 4px; font-size: 11px;
            text-decoration: none; color: #444; background: #fff;
            border: 1px solid #ddd; transition: 0.2s; cursor: pointer;
            font-weight: bold; margin-right: 5px;
        }
        .view-btn:hover { background: #f0f0f0; transform: translateY(-1px); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .view-btn.invoice { border-left: 3px solid #1976d2; }
        .view-btn.receipt { border-left: 3px solid #2e7d32; }

        @media print { .btn-group, .btn-del-entry, .view-btn { display: none; } }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1 class="title">売上管理表</h1>
            <div class="btn-group">
                <button class="btn btn-csv" onclick="exportCSV()">CSVで出力</button>
                <button class="btn btn-clear" onclick="clearData()">履歴をリセット</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><div>合計集計</div><div class="stat-value">￥<span id="stat-total">0</span></div></div>
            <div class="stat-card"><div>今月の売上</div><div class="stat-value">￥<span id="stat-current-month">0</span></div></div>
            <div class="stat-card"><div>案件数</div><div class="stat-value"><span id="stat-count">0</span> 件</div></div>
        </div>

        <div id="sales-container"></div>
    </div>

    <script>
        function loadSales() {
            const raw = localStorage.getItem('eianbai_sales_history_v2') || '[]';
            const history = JSON.parse(raw);
            const container = document.getElementById('sales-container');
            container.innerHTML = '';

            if (history.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:100px; color:#999;">データがありません</div>';
                updateStats([]);
                return;
            }

            history.sort((a,b) => b.last_updated - a.last_updated);

            const groups = {};
            history.forEach(item => {
                const month = item.date.match(/(\d{4}年\s?\d{1,2}月)/)?.[1] || '不明';
                if (!groups[month]) groups[month] = [];
                groups[month].push(item);
            });

            Object.keys(groups).forEach(month => {
                const items = groups[month];
                const monthTotal = items.reduce((sum, it) => sum + it.amount, 0);
                const section = document.createElement('section');
                section.className = 'month-section';
                
                let tableHtml = `
                    <div class="month-header"><h2 class="month-title">${month}</h2><span>￥${monthTotal.toLocaleString()}</span></div>
                    <table class="sales-table">
                        <thead><tr><th>管理番号</th><th>日付</th><th>宛名</th><th>詳細表示</th><th style="text-align:right">金額</th><th></th></tr></thead>
                        <tbody>
                `;

                items.forEach(it => {
                    const safeNum = encodeURIComponent(it.num);
                    tableHtml += `
                        <tr>
                            <td style="font-family:monospace; color:#666">${it.num}</td>
                            <td>${it.date}</td>
                            <td>${it.recipient}</td>
                            <td>
                                <button class="view-btn invoice" onclick="window.open('請求書_雛形.html?num=${safeNum}', '_blank')">📄 請求書</button>
                                <button class="view-btn receipt" onclick="window.open('領収書_雛形.html?num=${safeNum}', '_blank')">🧾 領収書</button>
                            </td>
                            <td style="text-align:right; font-weight:bold">￥${it.amount.toLocaleString()}</td>
                            <td><button class="btn-del-entry" onclick="deleteEntry('${it.num}')">×</button></td>
                        </tr>
                    `;
                });
                section.innerHTML = tableHtml + '</tbody></table>';
                container.appendChild(section);
            });
            updateStats(history);
        }

        function updateStats(history) {
            const total = history.reduce((s, it) => s + it.amount, 0);
            document.getElementById('stat-total').innerText = total.toLocaleString();
            document.getElementById('stat-count').innerText = history.length;
            const nowMatch = `${new Date().getFullYear()}年 ${new Date().getMonth()+1}月`;
            const monthTotal = history.filter(it => it.date.includes(nowMatch)).reduce((s, it) => s + it.amount, 0);
            document.getElementById('stat-current-month').innerText = monthTotal.toLocaleString();
        }

        function deleteEntry(num) {
            if (!confirm('削除しますか？')) return;
            let history = JSON.parse(localStorage.getItem('eianbai_sales_history_v2') || '[]');
            history = history.filter(it => it.num !== num);
            localStorage.setItem('eianbai_sales_history_v2', JSON.stringify(history));
            loadSales();
        }

        function clearData() {
            if (!confirm('リセットしますか？')) return;
            localStorage.setItem('eianbai_sales_history_v2', '[]');
            loadSales();
        }

        function exportCSV() {
            const history = JSON.parse(localStorage.getItem('eianbai_sales_history_v2') || '[]');
            let csv = "\ufeff管理番号,日付,宛名,金額\n";
            history.forEach(it => {
                csv += `"${it.num}","${it.date}","${it.recipient}",${it.amount}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `売上管理_${new Date().toLocaleDateString()}.csv`;
            link.click();
        }

        window.onload = loadSales;
    </script>
</body>
</html>
